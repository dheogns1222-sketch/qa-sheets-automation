name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check (Apps Script sources)
        run: |
          for f in src/*.js lib/*.js test/*.js; do
            node --check "$f"
          done

      - name: Unit tests (pure core logic)
        run: node --test test/
